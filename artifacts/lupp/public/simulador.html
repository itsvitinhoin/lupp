<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Simulador do Widget Luup</title>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Inter", -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #f7f7f8;
        min-height: 100vh;
        color: #0f172a;
      }
      main { width: 100%; margin: 0 auto; padding: 24px 20px 40px; }
      h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
      p.lead { margin-top: 4px; font-size: 13px; color: #64748b; }

      .layout {
        display: grid;
        grid-template-columns: 380px 1fr;
        gap: 20px;
        margin-top: 20px;
        align-items: start;
      }
      @media (max-width: 960px) { .layout { grid-template-columns: 1fr; } }

      .panel {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 18px;
      }
      .panel h2 {
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #475569;
        margin-bottom: 12px;
      }
      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .panel-head h2 { margin-bottom: 0; }
      button.toggle {
        background: #fff;
        color: #4f46e5;
        border: 1px solid #c7d2fe;
        border-radius: 999px;
        padding: 4px 12px;
        font-size: 11px;
        font-weight: 700;
      }
      button.toggle:hover { background: #eef2ff; }
      #form-body { margin-top: 12px; }
      #form-body.hidden, #script-panel.hidden { display: none; }
      /* Com os painéis recolhidos, a loja simulada ocupa toda a largura. */
      .layout.collapsed { grid-template-columns: 1fr; }

      .field { margin-bottom: 12px; }
      .field label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: #334155;
        margin-bottom: 4px;
      }
      .field input[type="text"], .field select {
        width: 100%;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        padding: 8px 10px;
        font-size: 13px;
        font-family: inherit;
        background: #fff;
        color: inherit;
      }
      .field input:focus, .field select:focus, textarea:focus {
        outline: 2px solid #6366f1;
        outline-offset: -1px;
      }
      .checks { display: flex; flex-wrap: wrap; gap: 12px; margin: 4px 0 12px; }
      .checks label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        font-weight: 600;
        color: #334155;
        cursor: pointer;
      }

      .script-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
      }
      #manual-badge {
        display: none;
        font-size: 11px;
        font-weight: 700;
        color: #9a3412;
        background: #ffedd5;
        border: 1px solid #fed7aa;
        border-radius: 999px;
        padding: 2px 10px;
      }
      textarea#script {
        width: 100%;
        min-height: 260px;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        padding: 10px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.5;
        color: #0f172a;
        background: #f8fafc;
        resize: vertical;
        white-space: pre;
      }

      .actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
      button {
        border: 0;
        border-radius: 10px;
        padding: 9px 14px;
        font-size: 13px;
        font-weight: 700;
        font-family: inherit;
        cursor: pointer;
      }
      button.primary { background: #4f46e5; color: #fff; }
      button.primary:hover { background: #4338ca; }
      button.ghost { background: #fff; color: #334155; border: 1px solid #cbd5e1; }
      button.ghost:hover { background: #f1f5f9; }

      .preview-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }
      .preview-head span { font-size: 12px; color: #64748b; }
      .view-toggle {
        display: inline-flex;
        background: #fff;
        border: 1px solid #cbd5e1;
        border-radius: 999px;
        padding: 2px;
        gap: 2px;
      }
      .view-toggle button {
        background: transparent;
        color: #64748b;
        border-radius: 999px;
        padding: 5px 14px;
        font-size: 12px;
      }
      .view-toggle button.active { background: #4f46e5; color: #fff; }
      iframe#preview {
        width: 100%;
        height: min(76vh, 820px);
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        background: #fff;
      }
      /* Visão mobile: viewport de celular centralizado com moldura */
      #preview-wrap.mobile { display: flex; justify-content: center; }
      #preview-wrap.mobile iframe#preview {
        width: 390px;
        max-width: 100%;
        height: min(76vh, 820px);
        border: 10px solid #0f172a;
        border-radius: 32px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Simulador do Widget Luup</h1>
      <p class="lead">
        Preencha os dados da loja, ajuste o script gerado se precisar e execute
        a simulação — a página de teste roda em um iframe isolado, como se fosse
        a loja com o snippet instalado.
      </p>

      <div class="layout">
        <div>
          <section class="panel">
            <div class="panel-head">
              <h2>Dados da simulação</h2>
              <button class="toggle" id="toggle-form" aria-expanded="true" aria-controls="form-body">Ocultar</button>
            </div>

            <div id="form-body">
            <div class="field">
              <label for="widget_src">URL do widget.js</label>
              <input type="text" id="widget_src" placeholder="http://localhost:5173/widget.js" />
            </div>
            <div class="field">
              <label for="store_id">Store ID (data-store-id)</label>
              <input type="text" id="store_id" placeholder="c322b7b4-22ce-4ff2-…" />
            </div>
            <div class="field">
              <label for="store">Slug da loja (data-store)</label>
              <input type="text" id="store" placeholder="minha-loja" />
            </div>
            <div class="field">
              <label for="store_name">Nome da loja (data-store-name)</label>
              <input type="text" id="store_name" placeholder="Minha Loja" />
            </div>
            <div class="field">
              <label for="store_url">URL da loja (data-store-url)</label>
              <input type="text" id="store_url" placeholder="https://minhaloja.com.br/" />
            </div>
            <div class="field">
              <label for="lupp_url">Luup URL (data-lupp-url)</label>
              <input type="text" id="lupp_url" placeholder="http://localhost:5173" />
            </div>
            <div class="field">
              <label for="supabase_url">Supabase URL (data-supabase-url, opcional)</label>
              <input type="text" id="supabase_url" placeholder="https://….supabase.co" />
            </div>
            <div class="field">
              <label for="carousel_widget">Tipo do carrossel (data-widget)</label>
              <select id="carousel_widget">
                <option value="carousel">carousel — renderiza em qualquer rota</option>
                <option value="home_carousel">home_carousel — só na home ("/")</option>
              </select>
            </div>

            <div class="checks">
              <label><input type="checkbox" id="launcher" checked /> Launcher flutuante</label>
              <label><input type="checkbox" id="carousel" checked /> Carrossel</label>
              <label><input type="checkbox" id="require_active" checked /> require-active</label>
            </div>
            </div>
          </section>

          <section class="panel" id="script-panel" style="margin-top: 16px;">
            <div class="script-head">
              <h2 style="margin-bottom: 0;">Script em execução</h2>
              <span id="manual-badge">editado manualmente</span>
            </div>
            <textarea id="script" spellcheck="false"></textarea>
            <div class="actions">
              <button class="primary" id="run">Executar simulação</button>
              <button class="ghost" id="regenerate">Regerar do formulário</button>
            </div>
          </section>
        </div>

        <section>
          <div class="preview-head">
            <h2 style="margin-bottom: 0; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: #475569;">Loja simulada</h2>
            <div class="view-toggle" role="group" aria-label="Modo de visualização">
              <button type="button" id="view-desktop" class="active">Desktop</button>
              <button type="button" id="view-mobile">Mobile</button>
            </div>
            <span id="status"></span>
          </div>
          <div id="preview-wrap">
            <iframe id="preview" title="Loja simulada com o widget Luup" allow="autoplay; fullscreen; clipboard-write"></iframe>
          </div>
        </section>
      </div>
    </main>

    <script>
      (function () {
        var FORM_KEY = "lupp_simulador_form";
        var SCRIPT_KEY = "lupp_simulador_script";
        var MANUAL_KEY = "lupp_simulador_manual";
        var VIEW_KEY = "lupp_simulador_view";
        var FORM_OPEN_KEY = "lupp_simulador_form_open";

        var TEXT_FIELDS = [
          "widget_src",
          "store_id",
          "store",
          "store_name",
          "store_url",
          "lupp_url",
          "supabase_url",
          "carousel_widget",
        ];
        var BOOL_FIELDS = ["launcher", "carousel", "require_active"];

        var textarea = document.getElementById("script");
        var badge = document.getElementById("manual-badge");
        var status = document.getElementById("status");
        var manualEdit = false;

        function el(id) { return document.getElementById(id); }

        function defaults() {
          return {
            widget_src: location.origin + "/widget.js",
            store_id: "",
            store: "",
            store_name: "",
            store_url: "",
            lupp_url: location.origin,
            supabase_url: "",
            carousel_widget: "carousel",
            launcher: true,
            carousel: true,
            require_active: true,
          };
        }

        function readForm() {
          var values = {};
          TEXT_FIELDS.forEach(function (key) { values[key] = el(key).value.trim(); });
          BOOL_FIELDS.forEach(function (key) { values[key] = el(key).checked; });
          return values;
        }

        function writeForm(values) {
          TEXT_FIELDS.forEach(function (key) {
            if (values[key] !== undefined) el(key).value = values[key];
          });
          BOOL_FIELDS.forEach(function (key) {
            if (values[key] !== undefined) el(key).checked = Boolean(values[key]);
          });
        }

        function loadState() {
          var values = defaults();
          try {
            var stored = JSON.parse(localStorage.getItem(FORM_KEY) || "null");
            if (stored) Object.keys(stored).forEach(function (key) { values[key] = stored[key]; });
          } catch (_) { /* estado corrompido — usa os padrões */ }

          // Parâmetros da URL (preenchidos pelo app) têm precedência e
          // descartam um script editado manualmente em sessões anteriores.
          var params = new URLSearchParams(location.search);
          var hasParams = false;
          TEXT_FIELDS.forEach(function (key) {
            var value = params.get(key);
            if (value !== null && value !== "") { values[key] = value; hasParams = true; }
          });

          writeForm(values);

          if (!hasParams && localStorage.getItem(MANUAL_KEY) === "1") {
            var storedScript = localStorage.getItem(SCRIPT_KEY);
            if (storedScript) {
              manualEdit = true;
              textarea.value = storedScript;
            }
          }
        }

        function persist() {
          try {
            localStorage.setItem(FORM_KEY, JSON.stringify(readForm()));
            localStorage.setItem(SCRIPT_KEY, textarea.value);
            localStorage.setItem(MANUAL_KEY, manualEdit ? "1" : "0");
          } catch (_) { /* armazenamento indisponível — segue sem persistir */ }
        }

        function attrLines(values, widgetType, indent) {
          var attrs = [
            ["data-store-id", values.store_id],
            ["data-store", values.store],
            ["data-store-name", values.store_name],
            ["data-store-url", values.store_url],
            ["data-widget", widgetType],
          ];
          if (widgetType !== "floating_launcher") {
            attrs.push(["data-home-carousel-enabled", "true"]);
          }
          if (values.supabase_url) attrs.push(["data-supabase-url", values.supabase_url]);
          if (values.lupp_url) attrs.push(["data-lupp-url", values.lupp_url]);
          if (values.require_active) attrs.push(["data-require-active", "true"]);
          return attrs
            .filter(function (pair) { return pair[1]; })
            .map(function (pair) { return indent + pair[0] + '="' + pair[1] + '"'; });
        }

        function buildScript(values) {
          var parts = [];

          if (values.launcher) {
            var setLines = attrLines(values, "floating_launcher", "")
              .map(function (line) {
                var eq = line.indexOf("=");
                var name = line.slice(0, eq);
                var value = line.slice(eq + 2, -1);
                return "    s.setAttribute('" + name + "', \"" + value + "\");";
              })
              .join("\n");

            parts.push(
              "<!-- Snippet Luup (launcher flutuante — igual ao instalado via GTM na loja) -->\n" +
              "<script>\n" +
              "  (function () {\n" +
              "    var s = document.createElement('script');\n" +
              "    s.async = true;\n" +
              "    s.src = \"" + values.widget_src + "\";\n" +
              setLines + "\n" +
              "    var firstScript = document.getElementsByTagName('script')[0];\n" +
              "    firstScript.parentNode.insertBefore(s, firstScript);\n" +
              "  })();\n" +
              "<\/script>"
            );
          }

          if (values.carousel) {
            parts.push(
              "<!-- Carrossel: o widget.js insere o carrossel logo após esta tag <script> -->\n" +
              "<script\n" +
              "  async\n" +
              "  src=\"" + values.widget_src + "\"\n" +
              attrLines(values, values.carousel_widget, "  ").join("\n") + "\n" +
              "><\/script>"
            );
          }

          return parts.join("\n\n");
        }

        function regenerate() {
          manualEdit = false;
          badge.style.display = "none";
          textarea.value = buildScript(readForm());
          persist();
        }

        function sandboxHtml(scriptHtml) {
          return [
            "<!doctype html>",
            '<html lang="pt-BR"><head><meta charset="utf-8" />',
            '<meta name="viewport" content="width=device-width, initial-scale=1" />',
            "<title>Loja simulada</title>",
            "<style>",
            "  * { margin: 0; padding: 0; box-sizing: border-box; }",
            '  body { font-family: "Inter", -apple-system, "Segoe UI", Roboto, sans-serif; background: #fff; color: #0f172a; }',
            "  header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid #e2e8f0; }",
            "  header b { font-size: 15px; }",
            "  header nav { display: flex; gap: 14px; font-size: 12px; color: #64748b; }",
            "  main { max-width: 1080px; margin: 0 auto; padding: 28px 20px 80px; }",
            "  .hero { height: 180px; border-radius: 14px; background: linear-gradient(120deg, #eef2ff, #f5f3ff); display: flex; align-items: center; justify-content: center; color: #6366f1; font-weight: 700; }",
            "  h3 { margin: 28px 0 12px; font-size: 15px; }",
            "  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }",
            "  .card { border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; }",
            "  .card .ph { height: 110px; background: #f1f5f9; }",
            "  .card p { padding: 8px 10px 12px; font-size: 12px; color: #475569; }",
            "</style></head><body>",
            "<header><b>Loja simulada</b><nav><span>Início</span><span>Produtos</span><span>Contato</span></nav></header>",
            "<main>",
            '  <div class="hero">Banner da loja</div>',
            scriptHtml,
            "  <h3>Produtos em destaque</h3>",
            '  <div class="grid">',
            '    <div class="card"><div class="ph"></div><p>Produto exemplo 1</p></div>',
            '    <div class="card"><div class="ph"></div><p>Produto exemplo 2</p></div>',
            '    <div class="card"><div class="ph"></div><p>Produto exemplo 3</p></div>',
            '    <div class="card"><div class="ph"></div><p>Produto exemplo 4</p></div>',
            "  </div>",
            "</main></body></html>",
          ].join("\n");
        }

        function run() {
          // Recria o iframe a cada execução: descarta instâncias anteriores do
          // widget e garante que o script rode em um documento limpo.
          var previous = document.getElementById("preview");
          var iframe = document.createElement("iframe");
          iframe.id = "preview";
          iframe.title = previous.title;
          iframe.setAttribute("allow", previous.getAttribute("allow"));
          previous.replaceWith(iframe);
          iframe.srcdoc = sandboxHtml(textarea.value);
          status.textContent = "Executado às " + new Date().toLocaleTimeString("pt-BR");
          persist();
        }

        TEXT_FIELDS.concat(BOOL_FIELDS).forEach(function (key) {
          el(key).addEventListener("input", function () {
            if (!manualEdit) regenerate();
            else persist();
          });
        });

        textarea.addEventListener("input", function () {
          manualEdit = true;
          badge.style.display = "inline-block";
          persist();
        });

        document.getElementById("regenerate").addEventListener("click", regenerate);
        document.getElementById("run").addEventListener("click", run);

        // Alterna a visão da loja simulada entre desktop e um viewport mobile.
        function setView(view) {
          document.getElementById("preview-wrap").className = view === "mobile" ? "mobile" : "";
          document.getElementById("view-desktop").className = view === "mobile" ? "" : "active";
          document.getElementById("view-mobile").className = view === "mobile" ? "active" : "";
          try { localStorage.setItem(VIEW_KEY, view); } catch (_) { /* sem persistência */ }
        }
        document.getElementById("view-desktop").addEventListener("click", function () { setView("desktop"); });
        document.getElementById("view-mobile").addEventListener("click", function () { setView("mobile"); });

        // Mostra/oculta os painéis "Dados da simulação" e "Script em execução";
        // recolhidos, a coluna some e a loja simulada ganha a largura toda.
        function setFormOpen(open) {
          var body = document.getElementById("form-body");
          var button = document.getElementById("toggle-form");
          body.className = open ? "" : "hidden";
          document.getElementById("script-panel").className = open ? "panel" : "panel hidden";
          document.querySelector(".layout").className = open ? "layout" : "layout collapsed";
          button.textContent = open ? "Ocultar" : "Mostrar";
          button.setAttribute("aria-expanded", open ? "true" : "false");
          try { localStorage.setItem(FORM_OPEN_KEY, open ? "1" : "0"); } catch (_) { /* sem persistência */ }
        }
        document.getElementById("toggle-form").addEventListener("click", function () {
          setFormOpen(document.getElementById("form-body").className === "hidden");
        });

        loadState();
        setView(localStorage.getItem(VIEW_KEY) === "mobile" ? "mobile" : "desktop");
        setFormOpen(localStorage.getItem(FORM_OPEN_KEY) !== "0");
        if (manualEdit) badge.style.display = "inline-block";
        else textarea.value = buildScript(readForm());
        run();
      })();
    </script>
  </body>
</html>
