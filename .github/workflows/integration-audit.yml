name: Integration Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

jobs:
  integration-audit:
    name: Integration contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Security scan
        run: pnpm run security:scan

      - name: Integration audit
        run: pnpm run integration:audit
