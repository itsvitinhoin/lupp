name: Production Smoke

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke test production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check production
        run: node scripts/production-smoke.mjs
