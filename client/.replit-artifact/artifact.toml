kind = "web"
previewPath = "/"
title = "Lupp — Video Commerce"
version = "1.0.0"
id = "client"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25576

[services.development]
run = "pnpm --filter @workspace/lupp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lupp", "run", "build" ]
publicDir = "client/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25576"
BASE_PATH = "/"
